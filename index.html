    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tsuen Wan Government Secondary School - 65th Anniversary Gala Dinner</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Libre Baskerville', serif;
            min-height: 100vh;
            background: linear-gradient(180deg, #E8F5F3 0%, #D0EBE7 50%, #B8E0D8 100%);
            color: #2D3436;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background-attachment: fixed;
        }

        .container {
            max-width: 550px;
            width: 100%;
        }

        .decorative-border {
            border: 3px double #C9A227;
            border-radius: 8px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 
                0 0 0 1px #D4AF37,
                0 0 0 3px #C9A227,
                0 10px 40px rgba(0, 121, 107, 0.15);
        }

        .inner-content {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 4px;
            padding: 40px 35px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #00796B;
        }

        .header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 500;
            color: #00796B;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .header .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            color: #00695C;
            font-style: italic;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header .subtitle-logo {
            height: 60px;
            width: auto;
        }

        .school-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .school-badge .logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }

        .school-badge .anniversary-logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
        }

        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
            color: #C9A227;
        }

        .divider::before,
        .divider::after {
            content: '';
            height: 1px;
            width: 60px;
            background: linear-gradient(90deg, transparent, #C9A227, transparent);
        }

        .divider .star {
            font-size: 1rem;
        }

        .search-section {
            text-align: center;
        }

        .search-section.disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: blur(3px);
        }

        .search-section.disabled::after {
            content: '請先填寫貴賓簽到表單';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 121, 107, 0.9);
            color: #fff;
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: 700;
            z-index: 10;
            width: 80%;
            text-align: center;
        }

        .search-section.hidden {
            display: none;
        }

        .search-label {
            font-size: 1rem;
            color: #00796B;
            margin-bottom: 15px;
            letter-spacing: 1px;
            font-weight: 700;
            display: block;
            text-align: center;
        }

        .search-input-wrapper {
            position: relative;
            margin-bottom: 10px;
        }

        .search-input {
            width: 100%;
            padding: 16px 25px;
            padding-right: 50px;
            font-size: 1rem;
            border: 2px solid #B2DFDB;
            border-radius: 30px;
            background: #FAFAFA;
            color: #2D3436;
            transition: all 0.3s ease;
            font-family: 'Libre Baskerville', serif;
            box-shadow: inset 0 2px 4px rgba(0, 121, 107, 0.08);
        }

        .search-input::placeholder {
            color: #90A4AE;
            font-style: italic;
        }

        .search-input:focus {
            outline: none;
            border-color: #00796B;
            background: #fff;
            box-shadow: 
                inset 0 2px 4px rgba(0, 121, 107, 0.08),
                0 0 15px rgba(0, 121, 107, 0.2);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #00796B;
            font-size: 1.1rem;
            pointer-events: none;
        }

        .search-hint {
            text-align: center;
            color: #00695C;
            font-size: 0.8rem;
            font-style: italic;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        /* Registration Form */
        .registration-section {
            background: #E0F2F1;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #B2DFDB;
        }

        .registration-section h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            color: #00796B;
            text-align: center;
            margin-bottom: 18px;
            font-weight: 500;
        }

        .privacy-notice {
            font-size: 0.7rem;
            color: #666;
            text-align: center;
            margin-bottom: 15px;
            font-style: italic;
        }

        .checkin-entry {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #B2DFDB;
            display: none;
        }

        .checkin-label {
            font-size: 0.85rem;
            color: #00695C;
            margin-bottom: 10px;
        }

        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .form-group {
            flex: 1;
        }

        .form-group label {
            display: block;
            font-size: 1.5rem;
            color: #00695C;
            margin-bottom: 5px;
            font-weight: 700;
            line-height: 1.3;
        }

        .form-group .optional {
            font-weight: 400;
            font-size: 1.3rem;
            color: #90A4AE;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            font-size: 1.9rem;
            border: 1px solid #B2DFDB;
            border-radius: 8px;
            background: #fff;
            color: #2D3436;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.3s ease;
        }

        .identity-select {
            width: 100%;
            padding: 12px 15px;
            font-size: 1.9rem;
            border: 1px solid #B2DFDB;
            border-radius: 8px;
            background: #fff;
            color: #2D3436;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .identity-select:focus {
            outline: none;
            border-color: #00796B;
            box-shadow: 0 0 10px rgba(0, 121, 107, 0.2);
        }

        .form-group label {
            display: block;
            font-size: 1.5rem;
            color: #00695C;
            margin-bottom: 5px;
            font-weight: 700;
            line-height: 1.3;
        }

        .form-group input::placeholder {
            color: #90A4AE;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00796B;
            box-shadow: 0 0 10px rgba(0, 121, 107, 0.2);
        }

        .mobile-input-wrapper {
            display: flex;
            align-items: center;
            background: #fff;
            border: 1px solid #B2DFDB;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            height: 44px;
        }

        .mobile-input-wrapper:focus-within {
            border-color: #00796B;
            box-shadow: 0 0 10px rgba(0, 121, 107, 0.2);
        }

        .mobile-input-wrapper .area-code {
            background: #E0F2F1;
            color: #00796B;
            padding: 12px 8px;
            font-weight: 700;
            font-size: 0.85rem;
            border-right: 1px solid #B2DFDB;
            min-width: 45px;
            text-align: center;
        }

        .mobile-input-wrapper input {
            border: none !important;
            box-shadow: none !important;
            border-radius: 0 8px 8px 0 !important;
            padding: 12px 12px !important;
            height: 44px;
        }

        .mobile-input-wrapper input:focus {
            box-shadow: none !important;
        }

        .autocomplete-wrapper {
            position: relative;
            width: 100%;
        }

        .suggestions-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #B2DFDB;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .suggestions-dropdown.show {
            display: block;
        }

        .suggestion-item {
            padding: 10px 15px;
            cursor: pointer;
            font-size: 0.9rem;
            border-bottom: 1px solid #E8F5F3;
            transition: background 0.2s;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background: #E8F5F3;
            color: #00796B;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            font-size: 0.9rem;
            height: 44px;
        }

        .submit-btn {
            width: 100%;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            background: #00796B;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.3s ease;
            height: 44px;
            line-height: 1;
        }

        .submit-btn:hover {
            background: #00695C;
            box-shadow: 0 4px 15px rgba(0, 121, 107, 0.3);
        }

        .form-success {
            text-align: center;
            padding: 20px;
            color: #00796B;
            font-weight: 700;
        }

        .form-success-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .results {
            margin-top: 25px;
        }

        .result-card {
            background: #E0F2F1;
            border-radius: 12px;
            padding: 22px;
            margin-bottom: 12px;
            border: 1px solid #B2DFDB;
            box-shadow: 0 4px 15px rgba(0, 121, 107, 0.1);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dotted #80CBC4;
        }

        .result-field:last-child {
            border-bottom: none;
        }

        .result-label {
            color: #00695C;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 400;
        }

        .result-value {
            color: #00796B;
            font-weight: 700;
            font-size: 1.05rem;
        }

        .no-results {
            text-align: center;
            padding: 30px;
            color: #607D8B;
        }

        .no-results-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .no-results p {
            font-style: italic;
        }

        /* Seating Plan Section */
        .seating-plan-section {
            margin-top: 20px;
            padding-top: 18px;
            border-top: 2px solid #00796B;
        }

        .seating-plan-toggle {
            text-align: center;
            margin-bottom: 15px;
        }

        .seating-plan-image-container {
            display: none;
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #B2DFDB;
        }

        .seating-plan-image-container.show {
            display: block;
        }

        .seating-plan-image {
            width: 100%;
            height: 600px;
            border-radius: 8px;
            display: block;
        }

        .table-highlight-info {
            background: #E0F2F1;
            border: 2px solid #00796B;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }

        .table-highlight-info.show {
            display: block;
        }

        .table-highlight-info h4 {
            color: #00796B;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .table-circle {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(0, 121, 107, 0.8);
            border: 2px solid #00796B;
            border-radius: 50%;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .table-circle:hover {
            background: #C9A227;
            transform: scale(1.2);
        }

        .table-circle.highlight {
            background: #C9A227;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .seating-plan-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .database-toggle {
            text-align: center;
            margin-top: 20px;
            padding-top: 18px;
            border-top: 2px solid #00796B;
        }

        .download-section {
            text-align: center;
            margin-top: 20px;
            padding-top: 18px;
            border-top: 2px solid #00796B;
        }

        .download-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            color: #00796B;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .download-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .download-btn {
            display: block;
            background: #00796B;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 1.1rem;
            font-family: 'Libre Baskerville', serif;
            letter-spacing: 1px;
            padding: 15px 20px;
            border-radius: 25px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background: #00695C;
            box-shadow: 0 4px 15px rgba(0, 121, 107, 0.3);
        }

        .toggle-btn {
            background: #00796B;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            font-family: 'Libre Baskerville', serif;
            letter-spacing: 1px;
            padding: 12px 24px;
            border-radius: 25px;
        }

        .toggle-btn:hover {
            background: #00695C;
            box-shadow: 0 4px 15px rgba(0, 121, 107, 0.3);
        }

        .full-database {
            margin-top: 20px;
            display: none;
        }

        .full-database.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .database-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            background: #FAFAFA;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #B2DFDB;
        }

        .database-table th,
        .database-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #E0F2F1;
        }

        .database-table th {
            background: #00796B;
            color: #fff;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .database-table td {
            color: #2D3436;
        }

        .database-table tr:last-child td {
            border-bottom: none;
        }

        .database-table tr:hover td {
            background: #E0F2F1;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.3rem;
            }

            .header .subtitle {
                font-size: 0.95rem;
            }

            .inner-content {
                padding: 20px 15px;
            }

            .form-row {
                flex-direction: column;
                gap: 10px;
            }

            .registration-section {
                padding: 15px;
            }

            .form-group input {
                font-size: 0.85rem;
            }

            .mobile-input-wrapper {
                height: 42px;
            }

            .mobile-input-wrapper input {
                height: 42px;
            }

            .submit-btn {
                height: 42px;
            }

            .database-table {
                font-size: 0.7rem;
            }

            .database-table th,
            .database-table td {
                padding: 8px 6px;
            }
        }
        .footer {
            text-align: center;
            padding: 20px;
            margin-top: 30px;
            border-top: 1px solid #B2DFDB;
            background: #E8F5F3;
        }

        .footer a {
            text-decoration: none;
            color: #00796B;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Libre Baskerville', serif;
            font-size: 0.9rem;
        }

        .footer a:hover {
            color: #00695C;
        }

        .footer-logo {
            height: 24px;
            width: auto;
        }
        
        .footer span {
            font-weight: 500;
        }

        .header-footer {
            text-align: center;
            padding: 10px 0;
            margin-top: 5px;
        }

        .header-footer a {
            text-decoration: none;
            color: #90A4AE;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: 'Libre Baskerville', serif;
            font-size: 0.7rem;
        }

        .header-footer a:hover {
            color: #00796B;
        }

        .header-footer .footer-logo {
            height: 16px;
            width: auto;
        }

        .top-footer {
            position: absolute;
            top: 15px;
            right: 20px;
            z-index: 1000;
        }

        .top-footer a {
            text-decoration: none;
            color: #00796B;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'Libre Baskerville', serif;
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.7);
            padding: 6px 12px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .top-footer a:hover {
            color: #00695C;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 2px 8px rgba(0, 121, 107, 0.2);
        }

        .top-footer .footer-logo {
            height: 18px;
            width: auto;
        }

        .top-footer span {
            font-weight: 500;
        }

        .bottom-footer {
            margin-top: 20px;
            padding: 15px;
            text-align: center;
            width: 100%;
        }

        .bottom-footer a {
            text-decoration: none;
            color: #00796B;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'Libre Baskerville', serif;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.5);
            padding: 8px 16px;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .bottom-footer a:hover {
            color: #00695C;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 2px 8px rgba(0, 121, 107, 0.2);
        }

        .bottom-footer .footer-logo {
            height: 20px;
            width: auto;
        }

        .bottom-footer span {
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="decorative-border">
            <div class="inner-content">
                <div class="school-badge">
                    <img src="1200px-TWGSS_Emblem.svg.png" alt="TWGSS Logo" class="logo">
                    <img src="reference.jpeg" alt="65th" class="anniversary-logo">
                </div>
                
                <div class="header">
                    <h1>Tsuen Wan Government Secondary School</h1>
                    <p class="subtitle">Anniversary Gala Dinner</p>
                </div>

                <div class="divider">
                    <span class="star">✦</span>
                </div>

                <div class="registration-section" id="registrationSection">
                    <h3>貴賓簽到</h3>
                    <p class="privacy-notice">所有收集的個人資料只用作登記入座及校友會日後聯絡之用</p>
                    <form id="registrationForm">
                        <!-- 身份選擇 -->
                        <div class="form-row">
                            <div class="form-group">
                                <label>身份 <span class="optional">(必填)</span></label>
                                <select id="identity" class="identity-select" required>
                                    <option value="">請選擇身份</option>
                                    <option value="vip">貴賓席</option>
                                    <option value="teacher">嘉賓老師</option>
                                    <option value="pta">家長教師會</option>
                                    <option value="staff">荃官教職員</option>
                                    <option value="alumni">校友</option>
                                </select>
                            </div>
                        </div>

                        <!-- 校友必填欄位 -->
                        <div id="alumniFields" style="display: none;">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>中文姓名(繁體) <span class="optional">(必填)</span></label>
                                    <div class="autocomplete-wrapper">
                                        <input type="text" id="chineseName" placeholder="請輸入中文姓名" autocomplete="off">
                                        <div id="nameSuggestions" class="suggestions-dropdown"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>中五/DSE畢業班 <span class="optional">(必填)</span></label>
                                    <input type="text" id="gradYear" placeholder="如: 1997" maxlength="4" minlength="4">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>電話號碼 <span class="optional">(必填)</span></label>
                                    <div class="mobile-input-wrapper">
                                        <span class="area-code">852</span>
                                        <input type="tel" id="mobile" placeholder="請輸入8位數字" maxlength="8">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 非校友欄位 -->
                        <div id="nonAlumniFields" style="display: none;">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>中文姓名(繁體) <span class="optional">(必填)</span></label>
                                    <div class="autocomplete-wrapper">
                                        <input type="text" id="chineseNameNonAlumni" placeholder="請輸入中文姓名" autocomplete="off">
                                        <div id="nameSuggestionsNonAlumni" class="suggestions-dropdown"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <button type="submit" class="submit-btn">提交</button>
                            </div>
                        </div>
                    </form>
                    <div id="formSuccess" class="form-success" style="display: none;">
                        <div class="form-success-icon">✓</div>
                        <p id="successMessage">已簽到！請使用下方搜尋功能查詢您的座枱</p>
                        
                        <!-- Download Section - Show after successful registration -->
                        <div class="download-section">
                            <h3 class="download-title">下載資料</h3>
                            <div class="download-links">
                                <a href="Seating Arrangement_1966-1984.jpg.jpeg" download class="download-btn">1966-1984 屆校友座位表</a>
                                <a href="Seating Arrangement_1985-2024.jpg.jpeg" download class="download-btn">1985-2024 屆校友座位表</a>
                                <a href="宴會餐枱佈置圖_Sample.jpg.jpeg" download class="download-btn">宴會餐枱佈置圖</a>
                                <a href="座位編排表_01.pdf" download class="download-btn">座位編排表</a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 已簽到入口 / Check-in Entry -->
                <div class="checkin-entry">
                    <p class="checkin-label">已經簽到？有以下選項：</p>
                    <button class="toggle-btn" id="btnCheckin" onclick="clearRegistration()">重新簽到 / 修改資料</button>
                </div>

                <div class="search-section" id="searchSection">
                    <p class="search-label">查詢座枱</p>
                    <div class="search-input-wrapper">
                        <input 
                            type="text" 
                            class="search-input" 
                            id="searchInput" 
                            placeholder="輸入姓名或畢業年份..."
                            autocomplete="off"
                        >
                        <span class="search-icon">🔍</span>
                    </div>
                    <p class="search-hint">可輸入中文姓名或畢業年份搜尋</p>

                    <div class="results" id="results"></div>
                </div>

                <!-- 枱位圖 Seating Plan -->
                <div class="seating-plan-section">
                    <div class="seating-plan-toggle">
                        <button class="toggle-btn" id="toggleSeatingPlan">提供各枱位置圖及座位編排表</button>
                    </div>
                    <div class="seating-plan-image-container" id="seatingPlanContainer">
                        <div class="seating-plan-wrapper">
                            <embed src="Layout Plan.pdf" type="application/pdf" class="seating-plan-image" id="seatingPlanImage">
                        </div>
                        <div class="table-highlight-info" id="tableHighlightInfo">
                            <h4>您的枱號: <span id="highlightedTable"></span></h4>
                            <p>請參考枱位圖找到您的座位位置</p>
                        </div>
                    </div>
                </div>

                <div class="database-toggle">
                    <button class="toggle-btn" id="toggleDb">提供全份出席者名單供參考</button>
                </div>

                <div class="full-database" id="fullDatabase">
                    <table class="database-table">
                        <thead>
                            <tr>
                                <th>姓名</th>
                                <th>畢業年份</th>
                                <th>枱號</th>
                            </tr>
                        </thead>
                        <tbody id="databaseBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global database variable
        let database = [];
        
        // Load database from CSV file
        function loadDatabase() {
            fetch('seating_plan.csv')
                .then(response => response.text())
                .then(csvText => {
                    const lines = csvText.split('\n');
                    const entries = [];
                    
                    // Skip first 2 rows (empty row and header)
                    for (let i = 2; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (!line) continue;
                        
                        // Parse CSV - handle commas inside quotes
                        const parts = line.split(',');
                        if (parts.length >= 4) {
                            const name = parts[1].trim();
                            const category = parts[2].trim();
                            const table = parts[3].trim();
                            
                            if (name && table) {
                                // Extract year if it's a 4-digit number
                                const yearMatch = category.match(/^\d{4}$/);
                                const year = yearMatch ? category : '"-"';
                                
                                // Clean name - remove extra spaces
                                const cleanName = name.replace(/\s+/g, ' ');
                                
                                entries.push({
                                    name: cleanName,
                                    year: year,
                                    table: parseInt(table)
                                });
                            }
                        }
                    }
                    
                    database = entries;
                    console.log(`Loaded ${database.length} records from CSV`);
                    
                    // Initialize the page with loaded database
                    populateFullDatabase();
                    
                    // Check registration status
                    const searchSection = document.getElementById('searchSection');
                    if (searchSection) {
                        const hasRegistered = localStorage.getItem('twgss_registrations');
                        if (!hasRegistered) {
                            searchSection.classList.add('hidden');
                        }
                    }
                })
                .catch(error => {
                    console.error('Error loading CSV:', error);
                });
        }
        
        // Call loadDatabase when page loads
        loadDatabase();

        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('results');
        const toggleBtn = document.getElementById('toggleDb');
        const fullDatabase = document.getElementById('fullDatabase');
        const databaseBody = document.getElementById('databaseBody');

        function displayResults(results) {
            if (results.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <p>找不到結果，請重新搜尋</p>
                    </div>
                `;
                return;
            }

            resultsContainer.innerHTML = results.map(guest => `
                <div class="result-card">
                    <div class="result-field">
                        <span class="result-label">姓名</span>
                        <span class="result-value">${guest.name}</span>
                    </div>
                    <div class="result-field">
                        <span class="result-label">畢業年份</span>
                        <span class="result-value">${guest.year === '-' ? 'N/A' : guest.year}</span>
                    </div>
                    <div class="result-field">
                        <span class="result-label">枱號</span>
                        <span class="result-value">${guest.table} 號枱</span>
                    </div>
                </div>
            `).join('');
        }

        function search(query) {
            if (!query.trim()) {
                resultsContainer.innerHTML = '';
                return;
            }

            const searchTerm = query.toLowerCase().trim();
            const results = database.filter(guest => {
                const nameMatch = guest.name.toLowerCase().includes(searchTerm);
                const yearMatch = guest.year !== '-' && guest.year.toString() === searchTerm;
                return nameMatch || yearMatch;
            });

            displayResults(results);
        }

        // Registration Form Handling
        const registrationForm = document.getElementById('registrationForm');
        const formSuccess = document.getElementById('formSuccess');
        const identitySelect = document.getElementById('identity');
        const alumniFields = document.getElementById('alumniFields');
        const nonAlumniFields = document.getElementById('nonAlumniFields');
        const successMessage = document.getElementById('successMessage');

        // Show/hide fields based on identity selection
        if (identitySelect) {
            identitySelect.addEventListener('change', function() {
                const identity = this.value;
                if (identity === 'alumni') {
                    alumniFields.style.display = 'block';
                    nonAlumniFields.style.display = 'none';
                    // Set required attributes
                    document.getElementById('chineseName').required = true;
                    document.getElementById('gradYear').required = true;
                    document.getElementById('mobile').required = true;
                } else if (identity) {
                    alumniFields.style.display = 'none';
                    nonAlumniFields.style.display = 'block';
                    // Clear required from alumni fields
                    document.getElementById('chineseName').required = false;
                    document.getElementById('gradYear').required = false;
                    document.getElementById('mobile').required = false;
                } else {
                    alumniFields.style.display = 'none';
                    nonAlumniFields.style.display = 'none';
                }
            });
        }

        // Input validation
        const chineseNameInput = document.getElementById('chineseName');
        const chineseNameNonAlumniInput = document.getElementById('chineseNameNonAlumni');
        const gradYearInput = document.getElementById('gradYear');
        const mobileInput = document.getElementById('mobile');
        const nameSuggestions = document.getElementById('nameSuggestions');
        const nameSuggestionsNonAlumni = document.getElementById('nameSuggestionsNonAlumni');

        // Autocomplete for Chinese name input (Alumni)
        if (chineseNameInput) {
            chineseNameInput.addEventListener('input', function(e) {
                const value = this.value;
                // Only allow Chinese characters
                this.value = value.replace(/[^\u4e00-\u9fa5]/g, '');
                
                // Show suggestions
                const searchTerm = this.value.trim().toLowerCase();
                if (searchTerm.length > 0 && database.length > 0) {
                    const matches = database.filter(guest => 
                        guest.name.toLowerCase().startsWith(searchTerm)
                    ).slice(0, 10); // Show max 10 suggestions
                    
                    if (matches.length > 0) {
                        nameSuggestions.innerHTML = matches.map(guest => 
                            `<div class="suggestion-item" data-name="${guest.name}">${guest.name} (${guest.table}號枱)</div>`
                        ).join('');
                        nameSuggestions.classList.add('show');
                    } else {
                        nameSuggestions.classList.remove('show');
                    }
                } else {
                    nameSuggestions.classList.remove('show');
                }
            });
            
            // Handle suggestion click
            nameSuggestions.addEventListener('click', function(e) {
                if (e.target.classList.contains('suggestion-item')) {
                    const selectedName = e.target.getAttribute('data-name');
                    chineseNameInput.value = selectedName;
                    nameSuggestions.classList.remove('show');
                }
            });
            
            // Close suggestions when clicking outside
            document.addEventListener('click', function(e) {
                if (!chineseNameInput.contains(e.target) && !nameSuggestions.contains(e.target)) {
                    nameSuggestions.classList.remove('show');
                }
            });
        }
        
        // Autocomplete for Chinese name input (Non-Alumni)
        if (chineseNameNonAlumniInput) {
            chineseNameNonAlumniInput.addEventListener('input', function(e) {
                const value = this.value;
                this.value = value.replace(/[^\u4e00-\u9fa5]/g, '');
                
                const searchTerm = this.value.trim().toLowerCase();
                if (searchTerm.length > 0 && database.length > 0) {
                    // For non-alumni, search tables 1-8 only
                    const matches = database.filter(guest => 
                        guest.name.toLowerCase().startsWith(searchTerm) && 
                        guest.table >= 1 && guest.table <= 8
                    ).slice(0, 10);
                    
                    if (matches.length > 0) {
                        nameSuggestionsNonAlumni.innerHTML = matches.map(guest => 
                            `<div class="suggestion-item" data-name="${guest.name}">${guest.name} (${guest.table}號枱)</div>`
                        ).join('');
                        nameSuggestionsNonAlumni.classList.add('show');
                    } else {
                        nameSuggestionsNonAlumni.classList.remove('show');
                    }
                } else {
                    nameSuggestionsNonAlumni.classList.remove('show');
                }
            });
            
            nameSuggestionsNonAlumni.addEventListener('click', function(e) {
                if (e.target.classList.contains('suggestion-item')) {
                    const selectedName = e.target.getAttribute('data-name');
                    chineseNameNonAlumniInput.value = selectedName;
                    nameSuggestionsNonAlumni.classList.remove('show');
                }
            });
            
            document.addEventListener('click', function(e) {
                if (!chineseNameNonAlumniInput.contains(e.target) && !nameSuggestionsNonAlumni.contains(e.target)) {
                    nameSuggestionsNonAlumni.classList.remove('show');
                }
            });
        }

        // Year - only allow 4-digit numbers and validate
        if (gradYearInput) {
            gradYearInput.addEventListener('input', function(e) {
                const value = this.value;
                this.value = value.replace(/[^0-9]/g, '');
                if (this.value.length > 4) {
                    this.value = this.value.slice(0, 4);
                }
            });
            
            // Validate year on blur
            gradYearInput.addEventListener('blur', function() {
                const year = parseInt(this.value);
                const currentYear = new Date().getFullYear();
                if (this.value.length > 0 && (year < 1950 || year > currentYear)) {
                    alert('請輸入有效的畢業年份 (1950-' + currentYear + ')');
                    this.value = '';
                    this.focus();
                }
            });
        }

        // Mobile - only allow 8-digit numbers and validate
        if (mobileInput) {
            mobileInput.addEventListener('input', function(e) {
                const value = this.value;
                this.value = value.replace(/[^0-9]/g, '');
                if (this.value.length > 8) {
                    this.value = this.value.slice(0, 8);
                }
            });
            
            // Validation on blur
            mobileInput.addEventListener('blur', function() {
                if (this.value.length > 0 && this.value.length < 8) {
                    alert('電話號碼必須為8位數字，請重新輸入');
                    this.value = '';
                    this.focus();
                }
            });
        }

        // Google Apps Script Web App URL for sheet integration
        const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwaE1Eei11U_xJlGOeUCdY195VcEcu9D-cfZFv-g9amV1ghAUyR1HPFHLLGC2q411fvQg/exec';

        if (registrationForm) {
            registrationForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const identity = document.getElementById('identity').value;
                
                // Map identity values to Chinese labels
                const identityLabels = {
                    'vip': '貴賓席',
                    'teacher': '嘉賓老師',
                    'pta': '家長教師會',
                    'staff': '荃官教職員',
                    'alumni': '校友'
                };
                const identityLabel = identityLabels[identity] || identity;
                
                let chineseName, gradYear, mobileValue, fullMobile;
                let tableNumber = null;
                
                if (identity === 'alumni') {
                    chineseName = document.getElementById('chineseName').value;
                    gradYear = document.getElementById('gradYear').value;
                    mobileValue = document.getElementById('mobile').value;
                    
                    // Validate phone is 8 digits
                    if (mobileValue.length !== 8) {
                        alert('電話號碼必須為8位數字，請重新輸入');
                        document.getElementById('mobile').focus();
                        return;
                    }
                    
                    fullMobile = '852' + mobileValue;
                    
                    // Search for table number in database
                    const searchTerm = chineseName.toLowerCase().trim();
                    const matches = database.filter(guest => 
                        guest.name.toLowerCase().includes(searchTerm)
                    );
                    
                    if (matches.length > 0) {
                        tableNumber = matches[0].table;
                    }
                    
                    // Show confirmation
                    const confirmMsg = `請確認資料正確：\n\n姓名：${chineseName}\n畢業年份：${gradYear}\n電話號碼：${fullMobile}\n身份：${identityLabel}\n\n確認無誤後，請按「確定」提交。`;
                    
                    if (!confirm(confirmMsg)) {
                        return;
                    }
                    
                    const formData = {
                        name: chineseName,
                        year: gradYear,
                        phone: fullMobile,
                        identity: identityLabel,
                        table: tableNumber,
                        timestamp: new Date().toISOString()
                    };
                    
                    // Send to Google Sheets
                    fetch(GOOGLE_SHEETS_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'text/plain;charset=utf-8',
                        },
                        body: JSON.stringify(formData)
                    }).catch(err => console.error('Error:', err));
                    
                    // Store locally
                    const registrations = JSON.parse(localStorage.getItem('twgss_registrations') || '[]');
                    registrations.push(formData);
                    localStorage.setItem('twgss_registrations', JSON.stringify(registrations));
                    
                    // Show success with table number
                    registrationForm.style.display = 'none';
                    formSuccess.style.display = 'block';
                    
                    if (tableNumber) {
                        successMessage.textContent = `已簽到！您的枱號是：${tableNumber} 號枱`;
                    } else {
                        successMessage.textContent = '已簽到！系統未能找到您的枱號，請聯絡工作人員。';
                    }
                    
                    // Enable search
                    const searchSection = document.getElementById('searchSection');
                    if (searchSection) {
                        searchSection.classList.remove('hidden');
                        searchSection.classList.remove('disabled');
                        searchSection.style.opacity = '1';
                        searchSection.style.filter = 'none';
                        searchSection.style.pointerEvents = 'auto';
                    }
                    
                } else {
                    // Non-alumni (VIP, teacher, PTA, staff)
                    chineseName = document.getElementById('chineseNameNonAlumni').value;
                    
                    // Search in tables 1-8 (limited for non-alumni)
                    const searchTerm = chineseName.toLowerCase().trim();
                    const matches = database.filter(guest => 
                        guest.name.toLowerCase().includes(searchTerm) && 
                        guest.table >= 1 && guest.table <= 8
                    );
                    
                    if (matches.length > 0) {
                        tableNumber = matches[0].table;
                    }
                    
                    // Show confirmation
                    const confirmMsg = `請確認資料正確：\n\n身份：${identityLabel}\n姓名：${chineseName}\n\n確認無誤後，請按「確定」提交。`;
                    
                    if (!confirm(confirmMsg)) {
                        return;
                    }
                    
                    const formData = {
                        name: chineseName,
                        identity: identityLabel,
                        table: tableNumber,
                        timestamp: new Date().toISOString()
                    };
                    
                    // Send to Google Sheets
                    fetch(GOOGLE_SHEETS_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'text/plain;charset=utf-8',
                        },
                        body: JSON.stringify(formData)
                    }).catch(err => console.error('Error:', err));
                    
                    // Store locally
                    const registrations = JSON.parse(localStorage.getItem('twgss_registrations') || '[]');
                    registrations.push(formData);
                    localStorage.setItem('twgss_registrations', JSON.stringify(registrations));
                    
                    // Show success with table number
                    registrationForm.style.display = 'none';
                    formSuccess.style.display = 'block';
                    
                    if (tableNumber) {
                        successMessage.textContent = `已簽到！您的枱號是：${tableNumber} 號枱`;
                    } else {
                        successMessage.textContent = '已簽到！系統未能找到您的枱號，請聯絡工作人員。';
                    }
                    
                    // Enable search
                    const searchSection = document.getElementById('searchSection');
                    if (searchSection) {
                        searchSection.classList.remove('hidden');
                        searchSection.classList.remove('disabled');
                        searchSection.style.opacity = '1';
                        searchSection.style.filter = 'none';
                        searchSection.style.pointerEvents = 'auto';
                    }
                }
                
                // Show checkin entry button
                const checkinEntry = document.querySelector('.checkin-entry');
                if (checkinEntry) {
                    checkinEntry.style.display = 'block';
                }
            });
        }

        function populateFullDatabase() {
            // Sort by table number (ascending), then by name
            const sortedDb = [...database].sort((a, b) => {
                if (a.table !== b.table) {
                    return a.table - b.table;
                }
                return a.name.localeCompare('zh-HK');
            });
            databaseBody.innerHTML = sortedDb.map(guest => `
                <tr>
                    <td>${guest.name}</td>
                    <td>${guest.year === '-' ? '-' : guest.year}</td>
                    <td>${guest.table}</td>
                </tr>
            `).join('');
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value;
            search(query);
            
            // Hide table highlight when search is empty
            if (!query.trim()) {
                tableHighlightInfo.classList.remove('show');
            }
        });

        toggleBtn.addEventListener('click', () => {
            fullDatabase.classList.toggle('show');
            toggleBtn.textContent = fullDatabase.classList.contains('show') 
                ? '隱藏名單' 
                : '提供全份出席者名單供參考';
        });

        // Seating Plan Toggle
        const toggleSeatingPlanBtn = document.getElementById('toggleSeatingPlan');
        const seatingPlanContainer = document.getElementById('seatingPlanContainer');
        const tableHighlightInfo = document.getElementById('tableHighlightInfo');
        const highlightedTableSpan = document.getElementById('highlightedTable');

        if (toggleSeatingPlanBtn) {
            toggleSeatingPlanBtn.addEventListener('click', () => {
                seatingPlanContainer.classList.toggle('show');
                toggleSeatingPlanBtn.textContent = seatingPlanContainer.classList.contains('show') 
                    ? '隱藏位置圖及座位編排表' 
                    : '提供各枱位置圖及座位編排表';
            });
        }

        // Highlight table when search result shows
        const originalDisplayResults = displayResults;
        displayResults = function(results) {
            originalDisplayResults(results);
            
            // Show table highlight info when results are displayed
            if (results.length > 0) {
                const tableNumber = results[0].table;
                highlightedTableSpan.textContent = tableNumber + ' 號枱';
                tableHighlightInfo.classList.add('show');
            } else {
                tableHighlightInfo.classList.remove('show');
            }
        };

        // Clear registration and allow re-checkin
        window.clearRegistration = function() {
            localStorage.removeItem('twgss_registrations');
            
            // Reset form
            const registrationForm = document.getElementById('registrationForm');
            const formSuccess = document.getElementById('formSuccess');
            const searchSection = document.getElementById('searchSection');
            
            if (registrationForm) {
                registrationForm.reset();
                registrationForm.style.display = 'block';
            }
            if (formSuccess) {
                formSuccess.style.display = 'none';
            }
            if (searchSection) {
                searchSection.classList.add('hidden');
                searchSection.classList.remove('disabled');
                searchSection.style.opacity = '';
                searchSection.style.pointerEvents = '';
            }
            
            // Hide checkin entry button
            const checkinEntry = document.querySelector('.checkin-entry');
            if (checkinEntry) {
                checkinEntry.style.display = 'none';
            }
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        
        // Initialize search section as hidden on page load (show only after registration)
        const searchSection = document.getElementById('searchSection');
        if (searchSection) {
            // Check if user has already registered
            const hasRegistered = localStorage.getItem('twgss_registrations');
            if (!hasRegistered) {
                searchSection.classList.add('hidden');
            }
        }
    </script>
    
    <!-- EventX Footer - Bottom Middle -->
    <div class="bottom-footer">
        <a href="https://eventx.io/" target="_blank" rel="noopener">
            Powered by <span>EventX</span>
            <img src="https://eventx.io/logo.png" alt="EventX" class="footer-logo" onerror="this.style.display='none'">
        </a>
    </div>
</body>
</html>
