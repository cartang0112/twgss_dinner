<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tsuen Wan Government Secondary School - 65th Anniversary Gala Dinner</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Libre Baskerville', serif;
            min-height: 100vh;
            background: linear-gradient(180deg, #E8F5F3 0%, #D0EBE7 50%, #B8E0D8 100%);
            color: #2D3436;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background-attachment: fixed;
        }

        .container {
            max-width: 550px;
            width: 100%;
        }

        .decorative-border {
            border: 3px double #C9A227;
            border-radius: 8px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 
                0 0 0 1px #D4AF37,
                0 0 0 3px #C9A227,
                0 10px 40px rgba(0, 121, 107, 0.15);
        }

        .inner-content {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 4px;
            padding: 40px 35px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #00796B;
        }

        .header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 500;
            color: #00796B;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .header .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            color: #00695C;
            font-style: italic;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header .subtitle-logo {
            height: 40px;
            width: auto;
        }

        .school-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .school-badge .logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        .school-badge .anniversary-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
            color: #C9A227;
        }

        .divider::before,
        .divider::after {
            content: '';
            height: 1px;
            width: 60px;
            background: linear-gradient(90deg, transparent, #C9A227, transparent);
        }

        .divider .star {
            font-size: 1rem;
        }

        .search-section {
            text-align: center;
        }

        .search-section.disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: blur(3px);
        }

        .search-section.disabled::after {
            content: '請先填寫嘉賓報到表單';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 121, 107, 0.9);
            color: #fff;
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: 700;
            z-index: 10;
        }

        .search-label {
            font-size: 1rem;
            color: #00796B;
            margin-bottom: 15px;
            letter-spacing: 1px;
            font-weight: 700;
            display: block;
            text-align: center;
        }

        .search-input-wrapper {
            position: relative;
            margin-bottom: 10px;
        }

        .search-input {
            width: 100%;
            padding: 16px 25px;
            padding-right: 50px;
            font-size: 1rem;
            border: 2px solid #B2DFDB;
            border-radius: 30px;
            background: #FAFAFA;
            color: #2D3436;
            transition: all 0.3s ease;
            font-family: 'Libre Baskerville', serif;
            box-shadow: inset 0 2px 4px rgba(0, 121, 107, 0.08);
        }

        .search-input::placeholder {
            color: #90A4AE;
            font-style: italic;
        }

        .search-input:focus {
            outline: none;
            border-color: #00796B;
            background: #fff;
            box-shadow: 
                inset 0 2px 4px rgba(0, 121, 107, 0.08),
                0 0 15px rgba(0, 121, 107, 0.2);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #00796B;
            font-size: 1.1rem;
            pointer-events: none;
        }

        .search-hint {
            text-align: center;
            color: #00695C;
            font-size: 0.8rem;
            font-style: italic;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        /* Registration Form */
        .registration-section {
            background: #E0F2F1;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #B2DFDB;
        }

        .registration-section h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            color: #00796B;
            text-align: center;
            margin-bottom: 18px;
            font-weight: 500;
        }

        .privacy-notice {
            font-size: 0.7rem;
            color: #666;
            text-align: center;
            margin-bottom: 15px;
            font-style: italic;
        }

        .checkin-entry {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #B2DFDB;
            display: none;
        }

        .checkin-label {
            font-size: 0.85rem;
            color: #00695C;
            margin-bottom: 10px;
        }

        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .form-group {
            flex: 1;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: #00695C;
            margin-bottom: 5px;
            font-weight: 700;
            line-height: 1.3;
        }

        .form-group .optional {
            font-weight: 400;
            font-size: 0.65rem;
            color: #90A4AE;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            font-size: 0.95rem;
            border: 1px solid #B2DFDB;
            border-radius: 8px;
            background: #fff;
            color: #2D3436;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: #90A4AE;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00796B;
            box-shadow: 0 0 10px rgba(0, 121, 107, 0.2);
        }

        .mobile-input-wrapper {
            display: flex;
            align-items: center;
            background: #fff;
            border: 1px solid #B2DFDB;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            height: 44px;
        }

        .mobile-input-wrapper:focus-within {
            border-color: #00796B;
            box-shadow: 0 0 10px rgba(0, 121, 107, 0.2);
        }

        .mobile-input-wrapper .area-code {
            background: #E0F2F1;
            color: #00796B;
            padding: 12px 8px;
            font-weight: 700;
            font-size: 0.85rem;
            border-right: 1px solid #B2DFDB;
            min-width: 45px;
            text-align: center;
        }

        .mobile-input-wrapper input {
            border: none !important;
            box-shadow: none !important;
            border-radius: 0 8px 8px 0 !important;
            padding: 12px 12px !important;
            height: 44px;
        }

        .mobile-input-wrapper input:focus {
            box-shadow: none !important;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            font-size: 0.9rem;
            height: 44px;
        }

        .submit-btn {
            width: 100%;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            background: #00796B;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Libre Baskerville', serif;
            transition: all 0.3s ease;
            height: 44px;
            line-height: 1;
        }

        .submit-btn:hover {
            background: #00695C;
            box-shadow: 0 4px 15px rgba(0, 121, 107, 0.3);
        }

        .form-success {
            text-align: center;
            padding: 20px;
            color: #00796B;
            font-weight: 700;
        }

        .form-success-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .results {
            margin-top: 25px;
        }

        .result-card {
            background: #E0F2F1;
            border-radius: 12px;
            padding: 22px;
            margin-bottom: 12px;
            border: 1px solid #B2DFDB;
            box-shadow: 0 4px 15px rgba(0, 121, 107, 0.1);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dotted #80CBC4;
        }

        .result-field:last-child {
            border-bottom: none;
        }

        .result-label {
            color: #00695C;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 400;
        }

        .result-value {
            color: #00796B;
            font-weight: 700;
            font-size: 1.05rem;
        }

        .no-results {
            text-align: center;
            padding: 30px;
            color: #607D8B;
        }

        .no-results-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .no-results p {
            font-style: italic;
        }

        /* Seating Plan Section */
        .seating-plan-section {
            margin-top: 20px;
            padding-top: 18px;
            border-top: 2px solid #00796B;
        }

        .seating-plan-toggle {
            text-align: center;
            margin-bottom: 15px;
        }

        .seating-plan-image-container {
            display: none;
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #B2DFDB;
        }

        .seating-plan-image-container.show {
            display: block;
        }

        .seating-plan-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }

        .table-highlight-info {
            background: #E0F2F1;
            border: 2px solid #00796B;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }

        .table-highlight-info.show {
            display: block;
        }

        .table-highlight-info h4 {
            color: #00796B;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .table-circle {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(0, 121, 107, 0.8);
            border: 2px solid #00796B;
            border-radius: 50%;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .table-circle:hover {
            background: #C9A227;
            transform: scale(1.2);
        }

        .table-circle.highlight {
            background: #C9A227;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .seating-plan-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .database-toggle {
            text-align: center;
            margin-top: 20px;
            padding-top: 18px;
            border-top: 2px solid #00796B;
        }

        .toggle-btn {
            background: #00796B;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            font-family: 'Libre Baskerville', serif;
            letter-spacing: 1px;
            padding: 12px 24px;
            border-radius: 25px;
        }

        .toggle-btn:hover {
            background: #00695C;
            box-shadow: 0 4px 15px rgba(0, 121, 107, 0.3);
        }

        .full-database {
            margin-top: 20px;
            display: none;
        }

        .full-database.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .database-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            background: #FAFAFA;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #B2DFDB;
        }

        .database-table th,
        .database-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #E0F2F1;
        }

        .database-table th {
            background: #00796B;
            color: #fff;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .database-table td {
            color: #2D3436;
        }

        .database-table tr:last-child td {
            border-bottom: none;
        }

        .database-table tr:hover td {
            background: #E0F2F1;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.3rem;
            }

            .header .subtitle {
                font-size: 0.95rem;
            }

            .inner-content {
                padding: 20px 15px;
            }

            .form-row {
                flex-direction: column;
                gap: 10px;
            }

            .registration-section {
                padding: 15px;
            }

            .form-group input {
                font-size: 0.85rem;
            }

            .mobile-input-wrapper {
                height: 42px;
            }

            .mobile-input-wrapper input {
                height: 42px;
            }

            .submit-btn {
                height: 42px;
            }

            .database-table {
                font-size: 0.7rem;
            }

            .database-table th,
            .database-table td {
                padding: 8px 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="decorative-border">
            <div class="inner-content">
                <div class="school-badge">
                    <img src="1200px-TWGSS_Emblem.svg.png" alt="TWGSS Logo" class="logo">
                </div>
                
                <div class="header">
                    <h1>Tsuen Wan Government Secondary School</h1>
                    <p class="subtitle">
                        <img src="65th-Anniversary-Logo.jpg" alt="65th" class="subtitle-logo">
                        Anniversary Gala Dinner
                    </p>
                </div>

                <div class="divider">
                    <span class="star">✦</span>
                </div>

                <div class="registration-section" id="registrationSection">
                    <h3>嘉賓報到</h3>
                    <p class="privacy-notice">所有收集的個人資料只用作登記入座及校友會日後聯絡之用</p>
                    <form id="registrationForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label>中文姓名 <span class="optional">(必填)</span></label>
                                <input type="text" id="chineseName" placeholder="請輸入中文姓名" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>中五/畢業班 <span class="optional">(必填)</span></label>
                                <input type="text" id="gradYear" placeholder="如: 1997" required maxlength="4" minlength="4">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>電話號碼 <span class="optional">(必填)</span></label>
                                <div class="mobile-input-wrapper">
                                    <span class="area-code">852</span>
                                    <input type="tel" id="mobile" placeholder="請輸入8位數字" required maxlength="8">
                                </div>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <button type="submit" class="submit-btn">提交</button>
                            </div>
                        </div>
                    </form>
                    <div id="formSuccess" class="form-success" style="display: none;">
                        <div class="form-success-icon">✓</div>
                        <p>已簽到！請使用下方搜尋功能查詢您的座枱</p>
                    </div>
                </div>

                <!-- 已簽到入口 / Check-in Entry -->
                <div class="checkin-entry">
                    <p class="checkin-label">已經簽到？有以下選項：</p>
                    <button class="toggle-btn" id="btnCheckin" onclick="clearRegistration()">重新簽到 / 修改資料</button>
                </div>

                <div class="search-section" id="searchSection">
                    <p class="search-label">查詢座枱</p>
                    <div class="search-input-wrapper">
                        <input 
                            type="text" 
                            class="search-input" 
                            id="searchInput" 
                            placeholder="輸入姓名或畢業年份..."
                            autocomplete="off"
                        >
                        <span class="search-icon">🔍</span>
                    </div>
                    <p class="search-hint">可輸入中文姓名或畢業年份搜尋</p>

                    <div class="results" id="results"></div>
                </div>

                <!-- 枱位圖 Seating Plan -->
                <div class="seating-plan-section">
                    <div class="seating-plan-toggle">
                        <button class="toggle-btn" id="toggleSeatingPlan">提供各檯的Location圖供參考</button>
                    </div>
                    <div class="seating-plan-image-container" id="seatingPlanContainer">
                        <div class="seating-plan-wrapper">
                            <img src="Table 1 - 39.jpg.jpeg" alt="場地枱位圖" class="seating-plan-image" id="seatingPlanImage">
                        </div>
                        <div class="table-highlight-info" id="tableHighlightInfo">
                            <h4>您的枱號: <span id="highlightedTable"></span></h4>
                            <p>請參考枱位圖找到您的座位位置</p>
                        </div>
                    </div>
                </div>

                <div class="database-toggle">
                    <button class="toggle-btn" id="toggleDb">提供全份出席者名單供參考</button>
                </div>

                <div class="full-database" id="fullDatabase">
                    <table class="database-table">
                        <thead>
                            <tr>
                                <th>姓名</th>
                                <th>畢業年份</th>
                                <th>枱號</th>
                            </tr>
                        </thead>
                        <tbody id="databaseBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

                    </div>
                    <div class="result-field">
                        <span class="result-label">畢業年份</span>
                        <span class="result-value">${guest.year === '-' ? 'N/A' : guest.year}</span>
                    </div>
                    <div class="result-field">
                        <span class="result-label">枱號</span>
                        <span class="result-value">${guest.table} 號枱</span>
                    </div>
                </div>
            `).join('');
        }

        function search(query) {
            if (!query.trim()) {
                resultsContainer.innerHTML = '';
                return;
            }

            const searchTerm = query.toLowerCase().trim();
            const results = database.filter(guest => {
                const nameMatch = guest.name.toLowerCase().includes(searchTerm);
                const yearMatch = guest.year !== '-' && guest.year.toString() === searchTerm;
                return nameMatch || yearMatch;
            });

            displayResults(results);
        }

        // Registration Form Handling
        const registrationForm = document.getElementById('registrationForm');
        const formSuccess = document.getElementById('formSuccess');
        const registrationSection = document.getElementById('registrationSection');

        // Input validation and formatting
        const chineseNameInput = document.getElementById('chineseName');
        const gradYearInput = document.getElementById('gradYear');
        const mobileInput = document.getElementById('mobile');

        // Chinese name - only allow Chinese characters
        if (chineseNameInput) {
            chineseNameInput.addEventListener('input', function(e) {
                const value = this.value;
                // Remove non-Chinese characters
                this.value = value.replace(/[^\u4e00-\u9fa5]/g, '');
            });
        }

        // Year - only allow 4-digit numbers
        if (gradYearInput) {
            gradYearInput.addEventListener('input', function(e) {
                const value = this.value;
                // Only allow numbers
                this.value = value.replace(/[^0-9]/g, '');
                // Limit to 4 digits
                if (this.value.length > 4) {
                    this.value = this.value.slice(0, 4);
                }
            });
        }

        // Mobile - only allow 8-digit numbers (香港手提電話)
        if (mobileInput) {
            mobileInput.addEventListener('input', function(e) {
                const value = this.value;
                // Only allow numbers
                this.value = value.replace(/[^0-9]/g, '');
                // Limit to 8 digits
                if (this.value.length > 8) {
                    this.value = this.value.slice(0, 8);
                }
            });
        }

        // Google Apps Script Web App URL for sheet integration
        const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycby0zfSVGq0BChxxAni-y8iJ-FeHoau6Ret9U9Ja2IS7He33KgAkEFcS8WDolDXwrjWLLA/exec';

        if (registrationForm) {
            registrationForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const chineseName = document.getElementById('chineseName').value;
                const gradYear = document.getElementById('gradYear').value;
                const mobileValue = document.getElementById('mobile').value;
                const fullMobile = '852' + mobileValue;
                
                const formData = {
                    name: chineseName,
                    year: gradYear,
                    phone: fullMobile,
                    timestamp: new Date().toISOString()
                };

                // Send data to Google Sheets
                fetch(GOOGLE_SHEETS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    },
                    body: JSON.stringify(formData)
                }).then(() => {
                    console.log('Data sent to Google Sheets');
                }).catch(err => {
                    console.error('Error sending to Google Sheets:', err);
                });

                // Store in localStorage (for local session)
                const registrations = JSON.parse(localStorage.getItem('twgss_registrations') || '[]');
                registrations.push(formData);
                localStorage.setItem('twgss_registrations', JSON.stringify(registrations));

                // Show success message
                registrationForm.style.display = 'none';
                formSuccess.style.display = 'block';
                
                // Enable search after successful registration
                const searchSection = document.getElementById('searchSection');
                if (searchSection) {
                    searchSection.classList.remove('disabled');
                    searchSection.style.opacity = '1';
                    searchSection.style.filter = 'none';
                    searchSection.style.pointerEvents = 'auto';
                }
                
                // Show checkin entry button after successful registration
                const checkinEntry = document.querySelector('.checkin-entry');
                if (checkinEntry) {
                    checkinEntry.style.display = 'block';
                }
            });
        }

        function populateFullDatabase() {
            const sortedDb = [...database].sort((a, b) => a.name.localeCompare('zh-HK'));
            databaseBody.innerHTML = sortedDb.map(guest => `
                <tr>
                    <td>${guest.name}</td>
                    <td>${guest.year === '-' ? '-' : guest.year}</td>
                    <td>${guest.table}</td>
                </tr>
            `).join('');
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value;
            search(query);
            
            // Hide table highlight when search is empty
            if (!query.trim()) {
                tableHighlightInfo.classList.remove('show');
            }
        });

        toggleBtn.addEventListener('click', () => {
            fullDatabase.classList.toggle('show');
            toggleBtn.textContent = fullDatabase.classList.contains('show') 
                ? '隱藏名單' 
                : '提供全份出席者名單供參考';
        });

        // Seating Plan Toggle
        const toggleSeatingPlanBtn = document.getElementById('toggleSeatingPlan');
        const seatingPlanContainer = document.getElementById('seatingPlanContainer');
        const tableHighlightInfo = document.getElementById('tableHighlightInfo');
        const highlightedTableSpan = document.getElementById('highlightedTable');

        if (toggleSeatingPlanBtn) {
            toggleSeatingPlanBtn.addEventListener('click', () => {
                seatingPlanContainer.classList.toggle('show');
                toggleSeatingPlanBtn.textContent = seatingPlanContainer.classList.contains('show') 
                    ? '隱藏Location圖' 
                    : '提供各檯的Location圖供參考';
            });
        }

        // Highlight table when search result shows
        const originalDisplayResults = displayResults;
        displayResults = function(results) {
            originalDisplayResults(results);
            
            // Show table highlight info when results are displayed
            if (results.length > 0) {
                const tableNumber = results[0].table;
                highlightedTableSpan.textContent = tableNumber + ' 號枱';
                tableHighlightInfo.classList.add('show');
            } else {
                tableHighlightInfo.classList.remove('show');
            }
        };

        // Clear registration and allow re-checkin
        window.clearRegistration = function() {
            localStorage.removeItem('twgss_registrations');
            
            // Reset form
            const registrationForm = document.getElementById('registrationForm');
            const formSuccess = document.getElementById('formSuccess');
            const searchSection = document.getElementById('searchSection');
            
            if (registrationForm) {
                registrationForm.reset();
                registrationForm.style.display = 'block';
            }
            if (formSuccess) {
                formSuccess.style.display = 'none';
            }
            if (searchSection) {
                searchSection.classList.add('disabled');
                searchSection.style.opacity = '0.5';
                searchSection.style.pointerEvents = 'none';
            }
            
            // Hide checkin entry button
            const checkinEntry = document.querySelector('.checkin-entry');
            if (checkinEntry) {
                checkinEntry.style.display = 'none';
            }
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        
        populateFullDatabase();
        
        // Initialize search section as disabled on page load
        const searchSection = document.getElementById('searchSection');
        if (searchSection) {
            // Check if user has already registered
            const hasRegistered = localStorage.getItem('twgss_registrations');
            if (!hasRegistered) {
                searchSection.classList.add('disabled');
                searchSection.style.opacity = '0.5';
                searchSection.style.pointerEvents = 'none';
                searchSection.style.position = 'relative';
            }
        }
    </script>
</body>
</html>
